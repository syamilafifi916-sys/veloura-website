<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veloura Checkout</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --primary:#ED337F; --primary-dark:#B91F60; --secondary:#ED337F;
  --neutral-dark:#2B1E22; --neutral-bg:#FFF7EA; --text:#4D3B40;
  --text-light:#8B7A7E; --border:#F1E8D8; --radius:12px;
  --shadow:0 8px 30px rgba(43,30,34,.08);
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--neutral-bg);color:var(--text);line-height:1.6}
.container{max-width:1080px;margin:auto;padding:34px 20px}
.top{display:flex;justify-content:space-between;align-items:center;gap:20px;margin-bottom:24px}
.logo{font-weight:800;letter-spacing:7px;color:var(--secondary);font-size:26px}
.back{color:var(--primary);font-weight:700;text-decoration:none}
.grid{display:grid;grid-template-columns:1.15fr .85fr;gap:24px;align-items:start}
.card{background:#fff;border:1px solid var(--border);border-radius:18px;padding:24px;box-shadow:var(--shadow)}
h1,h2{margin:0 0 16px;color:var(--neutral-dark)}
h1{font-family:Georgia,serif;font-size:clamp(32px,5vw,54px);line-height:1}
label{display:block;margin:14px 0 6px;font-weight:700;color:var(--neutral-dark)}
input,textarea,select{width:100%;padding:13px;border:1px solid var(--border);border-radius:var(--radius);font:inherit;background:#fff}
textarea{min-height:100px;resize:vertical}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.item{display:grid;grid-template-columns:72px 1fr;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
.item img{width:72px;height:92px;object-fit:cover;border-radius:10px;background:#FFF1F7}
.item-title{font-weight:800;color:var(--neutral-dark)}
.small{font-size:13px;color:var(--text-light)}
.total{display:flex;justify-content:space-between;align-items:center;margin-top:18px;font-size:22px;font-weight:900;color:var(--neutral-dark)}
button{width:100%;padding:15px;border:none;border-radius:var(--radius);background:var(--primary);color:white;font-weight:900;margin-top:18px;cursor:pointer;text-transform:uppercase;letter-spacing:.5px}
button:hover{background:var(--primary-dark)}
.notice{background:#FFF1F7;border:1px solid var(--border);padding:12px;border-radius:12px;color:var(--text-light);font-size:14px;margin-top:14px}
.error{color:#C44536;margin-top:12px;font-weight:700}
@media(max-width:820px){.grid,.row{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}

/* VELOURA OFFICIAL BRAND COLOR OVERRIDE */
:root{
  --primary:#ED337F !important;
  --primary-dark:#B91F60 !important;
  --secondary:#ED337F !important;
  --neutral-dark:#2B1E22 !important;
  --neutral-bg:#FFF7EA !important;
  --text:#4D3B40 !important;
  --text-light:#8B7A7E !important;
  --border:#F1E8D8 !important;
  --shadow:0 8px 30px rgba(43,30,34,.08) !important;
}
body{
  background:#FFF7EA !important;
  color:#4D3B40 !important;
}
.logo,
h1,
a{
  color:#ED337F !important;
}
.card{
  border-color:#F1E8D8 !important;
  box-shadow:0 12px 40px rgba(237,51,127,.10) !important;
}
button,
.primary{
  background:#ED337F !important;
  color:#fff !important;
}
button:hover,
.primary:hover{
  background:#B91F60 !important;
}
.secondary,
.notice,
.info,
.note,
.status-pill,
.step-number{
  background:#FFF1F7 !important;
  color:#2B1E22 !important;
}
input,
textarea,
select{
  border-color:#F1E8D8 !important;
}
.step.active{
  border-color:#ED337F !important;
  background:#FFF1F7 !important;
}
.step.active .step-number{
  background:#ED337F !important;
  color:#fff !important;
}
.order{
  background:#FFF1F7 !important;
  color:#ED337F !important;
}

</style>
</head>
<body>
<div class="container">
  <div class="top">
    <a class="back" href="index.html">← Back to Shop</a>
    <div class="logo">VELOURA</div>
  </div>

  <div class="grid">
    <div class="card">
      <h1>Checkout</h1>
      <form id="checkoutForm">
        <label>Full Name</label>
        <input id="customerName" required placeholder="Nama penuh">

        <div class="row">
          <div>
            <label>Email</label>
            <input id="email" type="email" required placeholder="email@example.com">
          </div>
          <div>
            <label>Phone</label>
            <input id="phone" required placeholder="0123456789">
          </div>
        </div>

        <label>Address</label>
        <textarea id="address" required placeholder="Alamat penghantaran penuh"></textarea>

        <div class="row">
          <div>
            <label>Postcode</label>
            <input id="postcode" required placeholder="43000">
          </div>
          <div>
            <label>City</label>
            <input id="city" required placeholder="Kajang">
          </div>
        </div>

        <label>State</label>
        <select id="state" required>
          <option value="">Select State</option>
          <option>Johor</option><option>Kedah</option><option>Kelantan</option>
          <option>Kuala Lumpur</option><option>Labuan</option><option>Melaka</option>
          <option>Negeri Sembilan</option><option>Pahang</option><option>Perak</option>
          <option>Perlis</option><option>Penang</option><option>Putrajaya</option>
          <option>Sabah</option><option>Sarawak</option><option>Selangor</option>
          <option>Terengganu</option>
        </select>

        <button type="submit" id="placeOrderBtn">Place Order</button>
        <div class="notice">Selepas klik Place Order, anda akan dibawa ke halaman pembayaran Bayarcash.</div>
        <div class="error" id="errorMsg"></div>
      </form>
    </div>

    <div class="card">
      <h2>Order Summary</h2>
      <div id="orderItems"></div>
      <div class="total"><span>Total</span><span>RM <span id="orderTotal">0</span></span></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBePIBUOZ9WApSG2MyXjOBzFRpDzH63NlI",
  authDomain: "veloura-b86d8.firebaseapp.com",
  projectId: "veloura-b86d8",
  storageBucket: "veloura-b86d8.firebasestorage.app",
  messagingSenderId: "425278142821",
  appId: "1:425278142821:web:59861b129be1bd648c098c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const cart = JSON.parse(localStorage.getItem("veloura_cart")) || [];
const orderItems = document.getElementById("orderItems");
const orderTotal = document.getElementById("orderTotal");
const errorMsg = document.getElementById("errorMsg");
const placeOrderBtn = document.getElementById("placeOrderBtn");

function money(value) {
  return Number(value || 0).toFixed(0);
}

function itemPrice(item) {
  return Number(item.salePrice || item.price || item.unitPrice || 0);
}

const totalAmount = cart.reduce((sum,item) => sum + itemPrice(item) * Number(item.qty || 1), 0);
orderTotal.textContent = money(totalAmount);

if(cart.length === 0) {
  orderItems.innerHTML = "<p>Your cart is empty.</p>";
  placeOrderBtn.disabled = true;
  placeOrderBtn.style.opacity = ".55";
} else {
  orderItems.innerHTML = cart.map(item => `
    <div class="item">
      <img src="${item.image || 'https://dummyimage.com/300x400/f8f1e9/3a271f&text=VELOURA'}" alt="${item.name}">
      <div>
        <div class="item-title">${item.name}</div>
        <div class="small">Size: ${item.size || '-'} · Colour: ${item.color || '-'}</div>
        <div class="small">Qty: ${item.qty || 1} · RM ${money(itemPrice(item) * Number(item.qty || 1))}</div>
      </div>
    </div>
  `).join("");
}

document.getElementById("checkoutForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  errorMsg.textContent = "";

  if(cart.length === 0) {
    errorMsg.textContent = "Cart kosong.";
    return;
  }

  placeOrderBtn.disabled = true;
  placeOrderBtn.textContent = "Submitting...";

  const orderNumber = "VEL-" + Date.now();

  const order = {
    orderNumber,
    customerName: document.getElementById("customerName").value.trim(),
    email: document.getElementById("email").value.trim(),
    phone: document.getElementById("phone").value.trim(),
    address: document.getElementById("address").value.trim(),
    postcode: document.getElementById("postcode").value.trim(),
    city: document.getElementById("city").value.trim(),
    state: document.getElementById("state").value,
    items: cart.map(item => ({
      productId: item.productId || item.id,
      name: item.name,
      size: item.size || "",
      color: item.color || "",
      qty: Number(item.qty || 1),
      price: itemPrice(item),
      subtotal: itemPrice(item) * Number(item.qty || 1)
    })),
totalAmount,

paymentStatus: "unpaid",
paymentMethod: "bayarcash",
paymentReference: "",
paidAt: null,

status: "pending",
source: "website",

createdAt: serverTimestamp()
  };

  try {
    const response = await fetch("/api/create-payment", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        customer: {
          name: document.getElementById("customerName").value.trim(),
          email: document.getElementById("email").value.trim(),
          phone: document.getElementById("phone").value.trim(),
          address: document.getElementById("address").value.trim(),
          postcode: document.getElementById("postcode").value.trim(),
          city: document.getElementById("city").value.trim(),
          state: document.getElementById("state").value
        },
        items: cart.map(item => ({
          productId: item.productId || item.id,
          name: item.name,
          size: item.size || "",
          color: item.color || "",
          qty: Number(item.qty || 1),
          price: itemPrice(item),
          subtotal: itemPrice(item) * Number(item.qty || 1)
        })),
        total: totalAmount
      })
    });

    const result = await response.json();

    if (!response.ok) {
      throw new Error(result.error || "Payment failed to create.");
    }

    if (!result.paymentUrl) {
      throw new Error("Payment URL not returned.");
    }

    localStorage.removeItem("veloura_cart");
    window.location.href = result.paymentUrl;

  } catch(error) {
    console.error(error);
    errorMsg.textContent = "Payment gagal dimulakan. Sila cuba lagi.";
    placeOrderBtn.disabled = false;
    placeOrderBtn.textContent = "Place Order";
  }
});
</script>
</body>
</html>
